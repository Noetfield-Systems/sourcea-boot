# Publish sourcea-boot to PyPI via Trusted Publishing (OIDC).
# Requires PyPI trusted publisher configured — see publish/PYPI_TRUSTED_PUBLISHING_SETUP_LOCKED_v1.md
# No PYPI_API_TOKEN or repository secrets needed.

name: publish-pypi

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm_trusted_publisher:
        description: >-
          Type PUBLISH to upload (founder only — PyPI trusted publisher must be configured first)
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and check metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Check package metadata
        run: twine check dist/*
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  pypi-publish:
    name: Upload to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.confirm_trusted_publisher == 'PUBLISH')
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
